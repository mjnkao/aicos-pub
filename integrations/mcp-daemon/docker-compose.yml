services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aicos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aicos
      POSTGRES_USER: aicos
      POSTGRES_PASSWORD: aicos
    ports:
      - "5432:5432"
    volumes:
      - aicos_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicos -d aicos"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  aicos_pg_data:
